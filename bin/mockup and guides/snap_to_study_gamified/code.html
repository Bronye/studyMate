<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff8052",
                        "background-light": "#f8f6f5",
                        "background-dark": "#23140f",
                        "emerald-accent": "#10b981",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .scanner-beam {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #10b981;
            box-shadow: 0 0 20px 4px #10b981, 0 0 40px 8px rgba(16, 185, 129, 0.3);
            top: 40%;
            z-index: 20;
            animation: scan 3s linear infinite alternate;
        }
        @keyframes scan {
            from { top: 10%; }
            to { top: 90%; }
        }
        .viewfinder-corner {
            position: absolute;
            width: 32px;
            height: 32px;
            border-color: #ff8052;
            filter: drop-shadow(0 0 8px rgba(255, 128, 82, 0.8));
        }
    </style>
<style>
        .scanner-beam {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #10b981;
            box-shadow: 0 0 20px 4px #10b981, 0 0 40px 8px rgba(16, 185, 129, 0.3);
            top: 40%;
            z-index: 20;
            animation: scan 3s linear infinite alternate;
        }
        @keyframes scan {
            from { top: 10%; }
            to { top: 90%; }
        }
        .viewfinder-corner {
            position: absolute;
            width: 32px;
            height: 32px;
            border-color: #ff8052;
            filter: drop-shadow(0 0 8px rgba(255, 128, 82, 0.8));
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative min-h-screen w-full overflow-hidden flex flex-col">
<!-- Mock Background Content (Dashboard) -->
<div class="absolute inset-0 z-0 p-6 opacity-40 grayscale">
<div class="flex justify-between items-center mb-8">
<div class="h-10 w-10 rounded-full bg-slate-300"></div>
<div class="h-6 w-32 bg-slate-300 rounded"></div>
<div class="h-10 w-10 rounded-full bg-slate-300"></div>
</div>
<div class="space-y-4">
<div class="h-48 w-full bg-slate-200 rounded-xl"></div>
<div class="grid grid-cols-2 gap-4">
<div class="h-32 bg-slate-200 rounded-xl"></div>
<div class="h-32 bg-slate-200 rounded-xl"></div>
</div>
<div class="h-40 w-full bg-slate-200 rounded-xl"></div>
</div>
</div>
<!-- Dark Scanner Overlay -->
<div class="absolute inset-0 z-10 bg-black/70 backdrop-blur-sm flex flex-col bg-black/85 backdrop-blur-md">
<!-- Header -->
<div class="flex items-center p-4 justify-between">
<button class="text-white p-2 rounded-full hover:bg-white/10 transition-colors shadow-[inset_0_1px_1px_rgba(255,255,255,0.2),0_4px_6px_rgba(0,0,0,0.3)] active:scale-95 active:shadow-inner bg-white/5">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-white text-lg font-bold tracking-tight">Snap to Study</h2>
<button class="text-white p-2 rounded-full hover:bg-white/10 transition-colors shadow-[inset_0_1px_1px_rgba(255,255,255,0.2),0_4px_6px_rgba(0,0,0,0.3)] active:scale-95 active:shadow-inner bg-white/5">
<span class="material-symbols-outlined">flashlight_on</span>
</button>
</div>
<!-- Viewfinder Area -->
<div class="flex-1 flex flex-col items-center justify-center p-8">
<div class="relative w-full max-w-sm aspect-[3/4] rounded-2xl border-2 border-white/10 overflow-hidden shadow-2xl">
<!-- Camera Preview Mockup -->
<div class="absolute inset-0 bg-slate-900 flex items-center justify-center">
<img class="w-full h-full object-cover opacity-60" data-alt="Close up of a textbook with text and diagrams" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvQBj_Z3_5sErYagagGmS0KdMLMsR3QGqy5nWoShnjwdPcPgkr1hSqybd0mYqWqlQSkl5E7XIc_ekA1uM45kNrg5qYTjwejMl94Ye0CgjKByLwkbZ_3TV1AoF-fDCcG53qFbQTX1txAWf-D4zAgAYl7CIhKR5TC6l_of7niw1sQDCyGOZc429UgbUoE4OhitmsEamP8pBapHJO3a5hAfCZX1nQfCmF2045LKTj3WlH9vRCxTT-V-1pHRymRYALCkEyzWXKd0pnEI93"/>
</div>
<!-- Scanner Beam -->
<div class="scanner-beam"></div>
<!-- Corner Accents -->
<div class="viewfinder-corner top-0 left-0 border-t-4 border-l-4 rounded-tl-lg"></div>
<div class="viewfinder-corner top-0 right-0 border-t-4 border-r-4 rounded-tr-lg"></div>
<div class="viewfinder-corner bottom-0 left-0 border-b-4 border-l-4 rounded-bl-lg"></div>
<div class="viewfinder-corner bottom-0 right-0 border-b-4 border-r-4 rounded-br-lg"></div>
<!-- Scanning Label -->
<div class="absolute bottom-6 left-1/2 -translate-x-1/2 px-4 py-2 bg-black/60 backdrop-blur-md rounded-full border border-white/20">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-emerald-accent animate-pulse"></span>
<span class="text-white text-xs font-semibold uppercase tracking-widest drop-shadow-[0_0_5px_rgba(255,255,255,0.5)]">Scanning Document</span>
</div>
</div>
</div>
<!-- Floating Feedback Bubbles -->
<div class="mt-8 flex flex-col items-center gap-3 w-full max-w-sm">
<div class="flex animate-bounce" style="animation-duration: 3s;">
<div class="flex items-center gap-2 px-4 py-2 bg-primary/20 backdrop-blur-xl text-primary rounded-full shadow-[0_8px_32px_0_rgba(255,128,82,0.37)] border border-primary/30">
<span class="material-symbols-outlined text-sm">auto_awesome</span>
<p class="text-sm font-bold">Summary Ready</p>
</div>
</div>
<div class="flex translate-x-12">
<div class="flex items-center gap-2 px-4 py-2 bg-emerald-accent/20 backdrop-blur-xl text-emerald-accent rounded-full shadow-[0_8px_32px_0_rgba(16,185,129,0.37)] border border-emerald-accent/30">
<span class="material-symbols-outlined text-sm">quiz</span>
<p class="text-sm font-bold">5 Quests Generated</p>
</div>
</div>
<div class="flex -translate-x-12">
<div class="flex items-center gap-2 px-4 py-2 bg-white/10 backdrop-blur-xl text-white rounded-full shadow-[0_8px_32px_0_rgba(255,255,255,0.1)] border border-white/20">
<span class="material-symbols-outlined text-sm text-primary">alt_route</span>
<p class="text-sm font-bold">Added to your Path</p>
</div>
</div>
</div>
</div>
<!-- Analysis Status -->
<div class="p-6 bg-black/40 backdrop-blur-xl border-t border-white/10">
<div class="flex justify-between items-end mb-3">
<div>
<p class="text-emerald-accent/60 text-[10px] uppercase font-bold tracking-[0.2em] mb-1">Neural Engine Active</p>
<h3 class="text-white text-base font-bold tracking-tight">Analyzing Document Structure...</h3>
</div>
<div class="flex flex-col items-end">
<span class="text-[10px] text-white/40 uppercase mb-1 font-mono">Progress</span>
<p class="text-emerald-accent text-xl font-black font-mono leading-none">65<span class="text-xs">%</span></p>
</div>
</div>
<div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden border border-white/10 p-[1px]">
<div class="h-full bg-gradient-to-r from-primary via-emerald-accent to-emerald-accent rounded-full transition-all duration-1000 shadow-[0_0_10px_#10b981]" style="width: 65%;"></div>
</div>
<div class="flex justify-between mt-3">
<p class="text-white/30 text-[9px] uppercase tracking-widest">Status: Syncing</p>
<p class="text-primary text-[9px] uppercase tracking-widest font-bold animate-pulse">Deep Scan Mode</p>
</div>
</div>
</div>
<!-- Bottom Navigation Bar (Persistent) -->
<div class="mt-auto z-20 bg-white border-t border-slate-200 px-4 pb-4 pt-2">
<div class="flex justify-around items-end max-w-md mx-auto">
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-[10px] font-medium uppercase tracking-tighter">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<div class="p-3 bg-primary/10 rounded-full mb-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">document_scanner</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-tighter">Scan</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">auto_stories</span>
<span class="text-[10px] font-medium uppercase tracking-tighter">Library</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium uppercase tracking-tighter">Profile</span>
</a>
</div>
</div>
</div>
</body></html>
