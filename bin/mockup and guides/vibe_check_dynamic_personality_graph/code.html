<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981",
                        "emerald-electric": "#10b981",
                        "vivid-violet": "#8b5cf6",
                        "punchy-coral": "#ff6b6b",
                        "oatmeal": "#F5F5F0",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.75rem",
                        "lg": "1.25rem",
                        "xl": "2rem",
                        "2xl": "2.5rem",
                        "3xl": "3.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased" style="background-color: #F5F5F0;">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">
<!-- Top Navigation -->
<header class="flex items-center justify-between p-6">
<button class="flex items-center justify-center size-10 rounded-full bg-white/50 dark:bg-white/10 backdrop-blur-sm shadow-sm">
<span class="material-symbols-outlined text-slate-900 dark:text-white">close</span>
</button>
<div class="flex flex-col items-center flex-1 max-w-[200px] relative">
<!-- Step Label -->
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400 dark:text-slate-500 mb-1">Personality Profile</span>
<!-- Dynamic Profile Graph Container -->
<div class="relative w-full h-12 flex items-center justify-center bg-white/30 dark:bg-white/5 backdrop-blur-md rounded-2xl border border-white/40 shadow-sm px-4">
<!-- The Profile Line (SVG) -->
<svg class="absolute inset-0 w-full h-full overflow-visible" preserveaspectratio="none" viewbox="0 0 160 40">
<!-- Background Path -->
<path class="text-slate-200 dark:text-slate-800" d="M 10 25 Q 40 10, 80 25 T 150 20" fill="none" stroke="currentColor" stroke-width="2"></path>
<!-- Progress Path -->
<path class="drop-shadow-[0_0_8px_rgba(16,185,129,0.5)]" d="M 10 25 Q 40 10, 80 25" fill="none" stroke="url(#grad1)" stroke-linecap="round" stroke-width="3"></path>
<defs>
<lineargradient id="grad1" x1="0%" x2="100%" y1="0%" y2="0%">
<stop offset="0%" style="stop-color:#10b981;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"></stop>
</lineargradient>
</defs>
</svg>
<!-- Icon Nodes -->
<div class="flex justify-between w-full relative z-10">
<!-- Visual Node (Active/Current) -->
<div class="relative flex flex-col items-center -translate-y-1">
<div class="size-6 rounded-full bg-vivid-violet border-2 border-white flex items-center justify-center shadow-lg ring-4 ring-vivid-violet/20">
<span class="material-symbols-outlined text-[14px] text-white font-bold">map</span>
</div>
<span class="absolute -bottom-5 text-[8px] font-bold text-vivid-violet whitespace-nowrap">STEP 1</span>
</div>
<!-- Auditory Node (Upcoming) -->
<div class="relative flex flex-col items-center translate-y-1 opacity-40">
<div class="size-5 rounded-full bg-white dark:bg-slate-800 border border-slate-200 flex items-center justify-center">
<span class="material-symbols-outlined text-[12px] text-slate-400">campaign</span>
</div>
</div>
<!-- Logical Node (Upcoming) -->
<div class="relative flex flex-col items-center -translate-y-1 opacity-40">
<div class="size-5 rounded-full bg-white dark:bg-slate-800 border border-slate-200 flex items-center justify-center">
<span class="material-symbols-outlined text-[12px] text-slate-400">psychology</span>
</div>
</div>
<!-- Social Node (Upcoming) -->
<div class="relative flex flex-col items-center translate-y-1 opacity-40">
<div class="size-5 rounded-full bg-white dark:bg-slate-800 border border-slate-200 flex items-center justify-center">
<span class="material-symbols-outlined text-[12px] text-slate-400">groups</span>
</div>
</div>
</div>
</div>
</div>
<div class="size-10"></div> <!-- Spacer for symmetry -->
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center px-6 pt-8 pb-12">
<h1 class="text-3xl font-extrabold text-center leading-tight mb-12 max-w-xs">
                How do you tackle a big task?
            </h1>
<!-- Swipeable Card Stack Container -->
<div class="relative w-full max-w-sm aspect-[4/5] flex items-center justify-center">
<!-- Background Stack Card (Card B Preview) -->
<div class="absolute w-[92%] h-full translate-y-6 scale-95 rounded-[2.5rem] bg-white/30 dark:bg-white/5 border border-white/20 backdrop-blur-md -z-10 shadow-xl"></div>
<!-- Active Card (Card A) -->
<div class="relative w-full h-full rounded-[3rem] bg-white/70 dark:bg-white/5 backdrop-blur-2xl border-b-4 border-white/60 dark:border-white/10 shadow-2xl flex flex-col p-8 items-center text-center group cursor-pointer transition-transform hover:scale-[1.02] active:scale-[0.98]">
<!-- Glassmorphism Gradient Background -->
<div class="absolute inset-0 bg-gradient-to-br from-vivid-violet/10 to-transparent rounded-xl pointer-events-none"></div>
<div class="relative flex-1 flex flex-col items-center justify-center gap-8">
<!-- Icon Circle -->
<div class="size-36 rounded-full bg-gradient-to-br from-vivid-violet to-violet-600 flex items-center justify-center shadow-[0_20px_50px_rgba(139,92,246,0.4)] border-b-8 border-violet-800/30">
<span class="material-symbols-outlined text-6xl text-white">map</span>
</div>
<div class="space-y-3">
<h3 class="text-2xl font-bold text-slate-900 dark:text-white">Planning &amp; Visuals</h3>
<p class="text-slate-600 dark:text-slate-300 text-lg">I like to map everything out first to see the big picture.</p>
</div>
</div>
<!-- Decorative Swipe Indicator -->
<div class="mt-auto pt-6 flex flex-col items-center gap-2">
<div class="flex gap-4">
<div class="size-14 rounded-full bg-white/80 dark:bg-white/10 border-b-4 border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-400 shadow-md">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<div class="size-14 rounded-full bg-punchy-coral flex items-center justify-center text-white shadow-[0_8px_20px_rgba(255,107,107,0.3)] border-b-4 border-red-600/30">
<span class="material-symbols-outlined text-2xl">favorite</span>
</div>
</div>
</div>
</div>
</div>
<!-- Swipe Hint Footer -->
<div class="mt-12 flex flex-col items-center gap-4">
<div class="flex items-center gap-3 px-8 py-4 rounded-full bg-white/80 dark:bg-white/5 backdrop-blur-md border-b-2 border-slate-200 dark:border-slate-800 shadow-lg">
<span class="material-symbols-outlined text-emerald-electric">swipe_right</span>
<span class="text-sm font-semibold text-slate-600 dark:text-slate-300">Swipe right for Visual</span>
</div>
<div class="flex gap-8 text-slate-400 dark:text-slate-500 font-medium text-sm mt-4">
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">west</span> SKIP</span>
<span class="flex items-center gap-1">UNDO <span class="material-symbols-outlined text-sm">undo</span></span>
</div>
</div>
</main>
<!-- Secondary Card Option (Hidden Representation for Visual UI Context) -->
<div class="hidden">
<!-- Card B: Megaphone Icon / Punchy Coral -->
<div class="size-32 rounded-full bg-gradient-to-br from-punchy-coral to-red-400 flex items-center justify-center">
<span class="material-symbols-outlined text-6xl text-white">campaign</span>
</div>
</div>
<!-- Abstract Decorative Elements -->
<div class="fixed top-0 right-0 -z-20 w-80 h-80 bg-emerald-electric/15 rounded-full blur-[100px] opacity-60 translate-x-1/3 -translate-y-1/3"></div>
<div class="fixed bottom-0 left-0 -z-20 w-[30rem] h-[30rem] bg-vivid-violet/10 rounded-full blur-[120px] opacity-40 -translate-x-1/2 translate-y-1/3"></div>
</div>
</body></html>
